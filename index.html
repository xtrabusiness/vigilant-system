function findUser(name, phone) {

function doLogin() {
    const name = document.getElementById('loginName').value.trim();
    const phone = document.getElementById('loginPhone').value.trim();
    const err = document.getElementById('loginError');

    if (!name || !phone) {
        err.textContent = '❌ أدخل الاسم والرقم';
        err.style.display = 'block';
        return;
    }

    const user = findUser(name, phone);
    if (!user) {
        err.textContent = '❌ الاسم أو الرقم غير مسجلين — تواصل مع الإدارة';
        err.style.display = 'block';
        return;
    }

    currentRep = name;
    currentRepPhone = phone;
    localStorage.setItem('kion_rep_name', name);
    localStorage.setItem('kion_rep_phone', phone);
    err.style.display = 'none';
    showApp();
    toast('🎉 مرحباً ' + name + '! جاهز للتسجيل');
}

function getGPS() {
    const box = document.getElementById('gpsBox');
    if (!navigator.geolocation) {
        toast('❌ المتصفح لا يدعم تحديد الموقع');
        return;
    }
    box.textContent = '⏳ جاري تحديد الموقع الجغرافي...';
    navigator.geolocation.getCurrentPosition(
        pos => {
            currentGPS = pos.coords.latitude.toFixed(6) + ',' + pos.coords.longitude.toFixed(6);
            box.textContent = '📍 تم تحديد الموقع: ' + currentGPS;
            box.classList.add('has-coords');
        },
        err => {
            box.textContent = '❌ فشل تحديد الموقع، اضغط لإعادة المحاولة';
            toast('❌ تأكد من تفعيل خدمات الموقع GPS');
        },
        { timeout: 10000, enableHighAccuracy: true }
    );
}

function sendToServer(client) {
    if (!navigator.onLine) {
        toast('⚠️ أنت غير متصل، تم الحفظ محلياً لحين الاتصال');
        renderList();
        return;
    }

    const btn = document.getElementById('syncBtn');
    if (btn) btn.classList.add('spin');

    if (!client.id) {
        client.id = 'KION-' + Date.now();
    }

    fetch(SHEETS_API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(client)
    })
    .then(() => {
        client.synced = true;
        localStorage.setItem('kion_clients_v2', JSON.stringify(clients));
        toast('☁️ تم إرسال البيانات وتحديثها في جوجل شيت بنجاح');
        if (btn) btn.classList.remove('spin');
        renderList();
    })
    .catch(err => {
        console.error('Sync error:', err);
        toast('⚠️ فشل الإرسال الفوري، محفوظة محلياً');
        if (btn) btn.classList.remove('spin');
        renderList();
    });
}

function syncPending() {
    if (!navigator.onLine) {
        toast('⚠️ أنت غير متصل بالإنترنت');
        return;
    }

    const pendingClients = clients.filter(c => !c.synced || !c.id);
    if (pendingClients.length === 0) {
        toast('✅ جميع العملاء مسجلون ومزامنون مسبقاً');
        return;
    }

    let successCount = 0;
    const btn = document.getElementById('syncBtn');
    if (btn) btn.classList.add('spin');

    let promises = pendingClients.map(client => {
        if (!client.id) {
            client.id = 'KION-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        }
        return fetch(SHEETS_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(client)
        }).then(() => {
            client.synced = true;
            successCount++;
        }).catch(err => console.error('Sync fail:', err));
    });

    Promise.all(promises).then(() => {
        localStorage.setItem('kion_clients_v2', JSON.stringify(clients));
        if (btn) btn.classList.remove('spin');
        toast(`✅ تم مزامنة ${successCount} من أصل ${pendingClients.length} عميل بنجاح`);
        renderList();
    });
}

function renderList() {
    const listEl = document.getElementById('clientsList');
    if (!listEl) return;
    const searchBox = document.getElementById('searchBox');
    const search = searchBox ? searchBox.value.toLowerCase() : '';
    
    let filtered = clients.filter(c => {
        const matchesSearch = (c.name && c.name.toLowerCase().includes(search)) || (c.area && c.area.toLowerCase().includes(search));
        const matchesFilter = currentFilter === 'all' || c.qual === currentFilter;
        return matchesSearch && matchesFilter;
    });

    if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state">لا توجد بيانات مسجلة مطابقة للبحث</div>';
        return;
    }

    listEl.innerHTML = filtered.map(c => `
        <div class="client-item ${c.qual || 'متابعة'}">
            <div class="client-header">
                <div>
                    <div class="client-name">${c.name}</div>
                    <div class="client-meta">📍 ${c.area} | 📞 ${c.phone || 'بدون هاتف'}</div>
                </div>
                <span class="client-badge ${c.qual || 'متابعة'}">${c.qual || 'متابعة'}</span>
            </div>
            <div class="client-meta">نشاط: ${c.type} ${c.specialty ? '(' + c.specialty + ')' : ''}</div>
            <div class="client-meta">📅 الزيارة القادمة: ${c.nextVisitDate} (${c.nextAction})</div>
            <div class="client-actions">
                <span class="sync-status ${c.synced ? 'synced' : 'pending'}">${c.synced ? '✔️ متزامن مع الشيت' : '⏳ معلق (غير متزامن)'}</span>
                <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')">حذف</button>
            </div>
        </div>
    `).join('');
}

}

function exportExcel() {
    if (clients.length === 0) {
        toast('❌ لا توجد بيانات للتصدير');
        return;
    }
    let csv = '\ufeffID,التاريخ,المندوب,العميل,النشاط,التخصص,الهاتف,المنطقة,العنوان,GPS,الزيارة القادمة,الإجراء,المنافس,سعر المنافس,نقطة الضعف,الملاحظات,التقييم,التصنيف\n';
    clients.forEach(c => {
        csv += `"${c.id || ''}","${c.date || ''}","${c.repName || c.rep || ''}","${c.name || ''}","${c.type || ''}","${c.specialty || ''}","${c.phone || ''}","${c.area || ''}","${c.address || ''}","${c.gps || ''}","${c.nextVisitDate || ''}","${c.nextAction || ''}","${c.compName || ''}","${c.compPrice || ''}","${c.compWeak || ''}","${c.notes || ''}","${c.rating || 0}","${c.qual || ''}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'KION_Clients_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
    toast('📥 تم تصدير الملف بنجاح');
}

function renderDash() {
    const dTotal = document.getElementById('dTotal');
    const dReady = document.getElementById('dReady');
    const dFuture = document.getElementById('dFuture');
    const dAreas = document.getElementById('dAreas');

    if (dTotal) dTotal.textContent = clients.length;
    if (dReady) dReady.textContent = clients.filter(c => c.qual === 'جاهز').length;
    if (dFuture) dFuture.textContent = clients.filter(c => c.qual === 'مستقبلي').length;
    
    const areas = [...new Set(clients.map(c => c.area).filter(Boolean))];
    if (dAreas) dAreas.textContent = areas.length;

    const areaListEl = document.getElementById('areaList');
    if (areaListEl) {
        if (areas.length === 0) {
            areaListEl.innerHTML = '<div style="color:var(--muted)">لا توجد مناطق مسجلة بعد</div>';
            return;
        }
        areaListEl.innerHTML = areas.map(a => {
            const count = clients.filter(c => c.area === a).length;
            return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span>📍 ${a}</span><b>${count} عميل</b></div>`;
        }).join('');
    }
}

function renderCatalog() {
    const searchEl = document.getElementById('catSearch');
    const search = searchEl ? searchEl.value.toLowerCase() : '';
    const container = document.getElementById('catalogContent');
    if (!container) return;
    let html = '';

    products.forEach(cat => {
        const matchedItems = cat.items.filter(i => i.name.toLowerCase().includes(search) || i.code.toLowerCase().includes(search));
        if (matchedItems.length > 0) {
            html += `<div class="catalog-cat">${cat.cat}</div>`;
            matchedItems.forEach(item => {
                html += `
                    <div class="product-item">
                        <div>
                            <div class="product-name">${item.name}</div>
                            <div class="product-code">كود: ${item.code}</div>
                        </div>
                        <div class="product-price">
                            <div class="white">${item.w !== null ? item.w + ' ج.م' : '—'}</div>
                            <div class="color">${item.c !== null ? item.c + ' ج.م (ملون)' : ''}</div>
                        </div>
                    </div>
                `;
            });
        }
    });

    container.innerHTML = html || '<div class="empty-state">لا توجد منتجات مطابقة للبحث</div>';
}

function populateHoSelect() {
    const select = document.getElementById('hoSelect');
    if (!select) return;
    const readyClients = clients.filter(c => c.qual === 'جاهز' || c.qual === 'مستقبلي');
    select.innerHTML = '<option value="">-- اختر عميلاً جاهزاً أو مستقبلياً --</option>' + readyClients.map(c => `<option value="${c.id}">${c.name} (${c.area})</option>`).join('');
}

function loadHandover(id) {
    if (!id) {
        const hoContent = document.getElementById('hoContent');
        if (hoContent) hoContent.style.display = 'none';
        return;
    }
    const c = clients.find(item => item.id === id);
    if (!c) return;

    const hoContent = document.getElementById('hoContent');
    if (hoContent) hoContent.style.display = 'block';
    
    const setVal = (elId, val) => {
        const el = document.getElementById(elId);
        if (el) el.textContent = val;
    };

    setVal('hoId', c.id || '—');
    setVal('hoDate', c.date ? new Date(c.date).toLocaleDateString('ar-EG') : '—');
    setVal('hoToday', new Date().toLocaleDateString('ar-EG'));
    setVal('hoQualBadge', c.qual || '—');
    setVal('hoName', c.name || '—');
    setVal('hoType', c.type || '—');
    setVal('hoSpec', c.specialty || '—');
    setVal('hoPhone', c.phone || '—');
    setVal('hoArea', c.area || '—');
    setVal('hoAddress', c.address || '—');
    setVal('hoGPS', c.gps || '—');
    setVal('hoNextVisitDate', c.nextVisitDate || '—');
    setVal('hoNextAction', c.nextAction || '—');
    setVal('hoComp', c.compName || '—');
    setVal('hoCompPrice', c.compPrice || '—');
    setVal('hoCompWeak', c.compWeak || '—');
    setVal('hoNotes', c.notes || '—');
    setVal('hoRating', (c.rating || 0) + ' نجوم');
    setVal('hoQual', c.qual || '—');
    setVal('hoSigRep', c.repName || currentRep || '—');
    setVal('hoSigDate', 'التاريخ: ' + new Date().toLocaleDateString('ar-EG'));
}
</script>
